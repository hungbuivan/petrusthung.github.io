<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-container">
    <h2>{{ site.title }}</h2>
    <div>
      <a href="/">Home</a>
      <a href="/about">About</a>
      <button onclick="toggleDarkMode()">🌙</button>
      <a href="/projects">Projects</a>
    </div>
  </div>
</nav>

<header class="header">
  <h1>{{ site.title }}</h1>
  <p>{{ site.description }}</p>
</header>

<div class="container">
  <main class="content">
    {{ content }}
  </main>

  <aside class="sidebar">
    <div class="card">
      <h3>👤 About</h3>
      <p>Hung 😎 Dev Flutter + Spring Boooot</p>
    </div>

    <div class="card">
      <h3>🔥 Recent Posts</h3>
      <ul>
        {% for post in site.posts limit:5 %}
          <li><a href="{{ post.url }}">{{ post.title }}</a></li>
        {% endfor %}
      </ul>
    </div>
  </aside>
</div>

<footer class="footer">
  <p>© 2026 Petrus Hung 🚀</p>
</footer>

<script>
function toggleDarkMode() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
